<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="rim" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe6a6"/>
      <stop offset="0.55" stop-color="#ffb04a"/>
      <stop offset="1" stop-color="#ff6b26"/>
    </linearGradient>

    <radialGradient id="fill" cx="35%" cy="28%" r="78%">
      <stop offset="0" stop-color="#fff1c7"/>
      <stop offset="0.35" stop-color="#ffd27a"/>
      <stop offset="0.72" stop-color="#ff9a3c"/>
      <stop offset="1" stop-color="#ff6a27"/>
    </radialGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#000" flood-opacity="0.40"/>
    </filter>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="1 0 0 0 0
                0 0.7 0 0 0
                0 0 0.2 0 0
                0 0 0 0.65 0" />
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- outer rim -->
    <path fill="url(#rim)" d="M64 8l14.8 30.2 33.3 4.8-24.1 23.5 5.7 33.1L64 84.5 34.3 99.6 40 66.5 15.9 43l33.3-4.8z"/>

    <!-- inner fill -->
    <path fill="url(#fill)" d="M64 16l12.4 25.3 28 4.0-20.2 19.7 4.8 27.9L64 80.8 39 92.9l4.8-27.9-20.2-19.7 28-4.0z"/>

    <!-- highlight -->
    <path fill="#fff" opacity="0.28" d="M64 18l10.5 21.5 24.1 3.5-17.4 17 4.1 24-21.3-11-21.3 11 4.1-24-17.4-17 24.1-3.5z"/>

    <!-- small specular -->
    <path fill="#fff" opacity="0.22" d="M47 33c7-6 16-10 26-10 3 0 6 0 9 1-7-2-15-2-22 0-9 2-16 7-21 14-2 3-3 6-4 9 2-6 6-11 12-14z" filter="url(#glow)"/>
  </g>
</svg>